name: DevSecOps Pipeline PHP

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  security-checks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v3

    # ÉTAPE 3.1 : Scan SAST avec SonarCloud
    - name: Scan SAST avec SonarCloud
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.organization=abdelhakim97
          -Dsonar.projectKey=abdelhakim97_Simulation_DevSecOps
          -Dsonar.php.version=7.4

    # ÉTAPE 3.2 : Scan des dépendances avec Snyk
    - name: Install dependencies
      run: composer install

    - name: Snyk Security Scan
      uses: snyk/actions/php@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

    # ÉTAPE 4 : Blocage conditionnel
    # Si Snyk détecte des vulnérabilités critiques, le pipeline échoue ici
    
    # ÉTAPE 5 : Déploiement Docker (si OK)
    - name: Connexion à Docker Hub
      if: success()  # Ne s'exécute que si les étapes précédentes sont OK
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build et push de l'image Docker
      if: success()
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/php-demo-secure:latest
    
    # ÉTAPE 3.3 : DAST avec OWASP ZAP (après déploiement)
    - name: Setup et Scan DAST avec OWASP ZAP
      if: success()
      run: |
        # Lancer l'application depuis l'image fraîchement buildée
        docker run -d --name php-app -p 8080:80 ${{ secrets.DOCKER_USERNAME }}/php-demo-secure:latest
        
        # Attendre le démarrage complet
         sleep 15
        
        # Lancer le scan ZAP complet
          docker run --network="host" -v $(pwd):/zap/wrk/:rw \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://localhost:8080 \
            -r zap_report.html \
            -x zap_report.xml \
            --hook=/zap/wrk/zap_hook.py || true

         # Sauvegarder les rapports
          mkdir -p zap-reports
          mv zap_report.* zap-reports/ 2>/dev/null || true
    - name: Upload des rapports ZAP
      if: always()  # Toujours uploader même si le scan trouve des problèmes
      uses: actions/upload-artifact@v3
      with:
      name: zap-reports
      path: zap-reports/ 