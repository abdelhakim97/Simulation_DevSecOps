name: DevSecOps PHP Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Installer PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'

    - name: Vérifier syntaxe PHP
      run: php -l index.php